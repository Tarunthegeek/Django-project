<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MediScan{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' },
            surface: { 900:'#0a0a0f', 800:'#111118', 700:'#1a1a27', 600:'#22223a', 500:'#2d2d4a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; margin: 0; position: relative; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    
    /* Input Fields */
    .form-input { width:100%; background:rgba(26,26,39,0.6); border:1px solid #2d2d4a; color:white; border-radius:0.75rem; padding:0.75rem 1rem; outline:none; transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(4px); }
    .form-input:focus { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,0.25), inset 0 2px 4px rgba(0,0,0,0.3); background:rgba(26,26,39,0.9); }
    .form-input::placeholder { color:#6b7280; }
    select.form-input { cursor:pointer; }
    
    /* Range Slider Styling */
    input[type="range"].form-input {
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #10b981 0%, #eab308 50%, #ef4444 100%);
      height: 8px;
      padding: 0;
      border: none;
      cursor: pointer;
    }
    input[type="range"].form-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #4f46e5;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.8);
      transition: transform 0.1s, background-color 0.1s;
    }
    input[type="range"].form-input::-webkit-slider-thumb:hover {
      transform: scale(1.25);
      background: #6366f1;
    }

    /* Cards and Sidebars */
    .glass-card { background:rgba(22,22,35,0.7); border:1px solid rgba(99,102,241,0.15); border-radius:1rem; backdrop-filter: blur(16px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .glass-card:hover { border-color:rgba(99,102,241,0.35); box-shadow: 0 12px 30px -10px rgba(99,102,241,0.15); }
    
    /* Badges */
    .risk-badge-low      { background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);border-radius:9999px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:600;display:inline-block; }
    .risk-badge-medium   { background:rgba(234,179,8,0.12);color:#fbbf24;border:1px solid rgba(234,179,8,0.25);border-radius:9999px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:600;display:inline-block; }
    .risk-badge-high     { background:rgba(249,115,22,0.12);color:#fb923c;border:1px solid rgba(249,115,22,0.25);border-radius:9999px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:600;display:inline-block; }
    .risk-badge-critical { background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);border-radius:9999px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:600;display:inline-block; }
    
    /* Nav links */
    .nav-link { display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1.1rem;border-radius:0.75rem;color:#9ca3af;font-size:0.875rem;font-weight:500;text-decoration:none;transition:all 0.25s ease;border:1px solid transparent; }
    .nav-link:hover { color:white;background:rgba(255,255,255,0.04);transform: translateX(4px); }
    .nav-link.active { color:white;background:linear-gradient(90deg, rgba(99,102,241,0.2) 0%, rgba(147,51,234,0.1) 100%);border-color:rgba(99,102,241,0.25);box-shadow: 0 4px 12px rgba(99,102,241,0.1); }
    
    /* Brand Glowing */
    .glow-brand   { box-shadow:0 0 30px rgba(99,102,241,0.3); }
    .glow-emerald { box-shadow:0 0 30px rgba(16,185,129,0.3); }
    .glow-yellow  { box-shadow:0 0 30px rgba(234,179,8,0.3); }
    .glow-orange  { box-shadow:0 0 30px rgba(249,115,22,0.3); }
    .glow-red     { box-shadow:0 0 30px rgba(239,68,68,0.3); }
    
    /* Animations */
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .anim-fade  { animation:fadeIn  0.5s ease-out forwards; }
    .anim-up    { animation:slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* Floating Background Orbs */
    @keyframes floatOrb1 {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-40px, 40px) scale(1.15); }
    }
    .orb-slow-1 { animation: floatOrb1 20s infinite ease-in-out; }
    .orb-slow-2 { animation: floatOrb2 25s infinite ease-in-out; }
    
    @keyframes scoreFill { from{stroke-dashoffset:283} to{stroke-dashoffset:var(--tgt,283)} }
    .score-arc { animation:scoreFill 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes pulseGreen { 0%,100%{opacity:1}50%{opacity:0.35} }
    .pdot { width:0.45rem;height:0.45rem;border-radius:9999px;background:#10b981;display:inline-block;animation:pulseGreen 2s ease-in-out infinite; box-shadow: 0 0 8px #10b981; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; }
  </style>
</head>
<body class="dark">
{% block content %}{% endblock %}
</body>
</html>
