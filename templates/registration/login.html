{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="card auth-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
    </form>
    <p class="small-text">Need an account? <a href="{% url 'register' %}">Register here</a>.</p>
</section>
{% endblock %}
