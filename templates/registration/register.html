{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="card auth-card">
    <h2>Create account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p class="small-text">Already registered? <a href="{% url 'login' %}">Login here</a>.</p>
</section>
{% endblock %}
